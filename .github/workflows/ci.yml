name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install toolchain
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Generate sqlc code
        run: sqlc generate

      - name: Ensure generated code is committed
        run: git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: Govulncheck
        run: govulncheck ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/api ./cmd/worker

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
