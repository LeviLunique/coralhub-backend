name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Generate sqlc code
        run: sqlc generate

      - name: Ensure generated code is committed
        run: git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/api ./cmd/worker
