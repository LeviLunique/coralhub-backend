services:
  postgres:
    image: postgres:17-alpine
    container_name: coralhub-postgres
    environment:
      POSTGRES_DB: coralhub
      POSTGRES_USER: coralhub
      POSTGRES_PASSWORD: coralhub
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coralhub -d coralhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: coralhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:latest
    container_name: coralhub-minio-bootstrap
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        mc mb --ignore-existing local/coralhub-local
        mc anonymous set none local/coralhub-local
    restart: "no"

volumes:
  postgres-data:
  minio-data:
